<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章封面圖片編輯器 (雙圖標庫版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }

        .preview-container {
            aspect-ratio: 1920 / 968;
            width: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="image" class="text-blue-600"></i> 文章封面編輯器
                </h1>
                <p class="text-slate-500 text-sm mt-1">整合 Lucide & Phosphor 兩大圖標庫 • 尺寸 1920 x 968</p>
            </div>
            <button id="downloadBtn" class="flex items-center justify-center gap-2 bg-slate-900 hover:bg-black text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95">
                <i data-lucide="download" size="20"></i> 下載 PNG 封面
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 space-y-4">
                <div id="previewWrapper" class="bg-white p-3 rounded-2xl border border-slate-200 shadow-xl">
                    <div id="captureArea" class="preview-container flex items-center justify-center bg-pink-50 relative transition-colors duration-500">
                        <div id="iconContainer" class="flex items-center justify-center">
                            </div>
                    </div>
                </div>
                
                <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl flex items-start gap-3">
                    <i data-lucide="info" class="text-blue-500 mt-0.5" size="18"></i>
                    <p class="text-xs text-blue-700 leading-relaxed">
                        搜尋支援超過 2400 個以上的圖標 (Lucide + Phosphor)。下載時系統會自動處理不同庫的渲染，產出高品質 1920x968 圖片。
                    </p>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                
                <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <i data-lucide="palette" size="16"></i> 1. 風格快選
                    </h2>
                    <div id="themeGrid" class="grid grid-cols-3 gap-3">
                        </div>
                </section>

                <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[480px]">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <i data-lucide="search" size="16"></i> 2. 搜尋圖標
                    </h2>
                    
                    <div class="relative mb-4">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size="16"></i>
                        <input type="text" id="searchInput" placeholder="搜尋名稱 (如 user, heart, fire...)" class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>

                    <div id="loadingStatus" class="text-center text-slate-400 text-xs mb-2 hidden">
                        正在載入完整圖標庫...
                    </div>

                    <div id="iconGrid" class="flex-1 overflow-y-auto grid grid-cols-4 gap-2 pr-1 no-scrollbar">
                        </div>
                </section>
            </div>
        </div>
    </div>

    <canvas id="exportCanvas" width="1920" height="968" class="hidden"></canvas>

    <script>
        const themes = [
            { name: '粉紅', bg: '#FFF1F2', icon: '#E11D48' },
            { name: '粉藍', bg: '#EFF6FF', icon: '#2563EB' },
            { name: '粉紫', bg: '#FAF5FF', icon: '#9333EA' },
            { name: '粉黃', bg: '#FFFBEB', icon: '#D97706' },
            { name: '粉綠', bg: '#F0FDF4', icon: '#16A34A' },
            { name: '粉青', bg: '#ECFEFF', icon: '#0891B2' },
        ];

        let currentTheme = themes[0];
        let currentIcon = 'map-pin';
        let currentLib = 'lucide'; 
        let customColor = themes[0].icon;

        window.onload = () => {
            initThemes();
            initIcons();
            updatePreview();
        };

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterIcons(e.target.value);
        });

        function initThemes() {
            const grid = document.getElementById('themeGrid');
            themes.forEach(theme => {
                const btn = document.createElement('button');
                btn.className = "p-1 rounded-xl border-2 border-transparent hover:border-slate-200 transition-all focus:outline-none";
                btn.innerHTML = `
                    <div class="w-full h-8 rounded-lg mb-1" style="background-color: ${theme.bg}"></div>
                    <div class="text-[10px] font-bold text-slate-500 text-center">${theme.name}</div>
                `;
                btn.onclick = () => {
                    currentTheme = theme;
                    customColor = theme.icon;
                    updatePreview();
                };
                grid.appendChild(btn);
            });
        }

        async function initIcons() {
            const grid = document.getElementById('iconGrid');
            const loadingStatus = document.getElementById('loadingStatus');
            
            // 1. 同步載入 Lucide 圖標
            Object.keys(lucide.icons).forEach(name => {
                const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                appendIconBtn(grid, kebabName, 'lucide');
            });
            lucide.createIcons();

            // 2. 非同步載入全量 Phosphor 圖標
            loadingStatus.classList.remove('hidden');
            try {
                // 讀取 Phosphor 的 CSS 檔案
                const res = await fetch('https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css');
                const css = await res.text();
                
                // 利用正則表達式提取所有 .ph-xxxx 的名稱
                const matches = [...css.matchAll(/\.ph-([a-z0-9-]+)::?before/g)];
                const phosphorIconNames = [...new Set(matches.map(m => m[1]))];
                
                phosphorIconNames.forEach(name => {
                    appendIconBtn(grid, name, 'phosphor');
                });

                // 若此時已有搜尋文字，重新過濾一次
                const currentSearch = document.getElementById('searchInput').value;
                if(currentSearch) filterIcons(currentSearch);

            } catch (err) {
                console.error("無法動態獲取 Phosphor 清單：", err);
                loadingStatus.innerText = "Phosphor 圖標載入失敗";
            } finally {
                loadingStatus.classList.add('hidden');
            }
        }

        function appendIconBtn(grid, name, lib) {
            const btn = document.createElement('button');
            btn.className = "aspect-square flex flex-col items-center justify-center p-2 rounded-xl bg-slate-50 hover:bg-blue-50 hover:text-blue-600 transition-all text-slate-400 group";
            btn.dataset.name = name;
            btn.dataset.lib = lib;
            
            if (lib === 'lucide') {
                btn.innerHTML = `<i data-lucide="${name}" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>`;
            } else {
                btn.innerHTML = `<i class="ph ph-${name} text-2xl group-hover:scale-110 transition-transform"></i>`;
            }

            btn.onclick = () => {
                currentIcon = name;
                currentLib = lib;
                updatePreview();
            };
            grid.appendChild(btn);
        }

        function filterIcons(query) {
            const items = document.querySelectorAll('#iconGrid button');
            items.forEach(item => {
                const name = item.dataset.name;
                item.style.display = name.includes(query.toLowerCase()) ? 'flex' : 'none';
            });
        }

        function updatePreview() {
            const captureArea = document.getElementById('captureArea');
            const iconContainer = document.getElementById('iconContainer');

            captureArea.style.backgroundColor = currentTheme.bg;

            if (currentLib === 'lucide') {
                iconContainer.innerHTML = `
                    <i data-lucide="${currentIcon}" 
                       class="w-40 h-40 opacity-80" 
                       style="color: ${customColor}">
                    </i>
                `;
                lucide.createIcons();
            } else {
                iconContainer.innerHTML = `
                    <i class="ph-fill ph-${currentIcon}" 
                       style="font-size: 160px; color: ${customColor}; opacity: 0.8;">
                    </i>
                `;
            }
        }

        // 下載邏輯保持不變
        document.getElementById('downloadBtn').onclick = async () => {
            const canvas = document.getElementById('exportCanvas');
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = currentTheme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const iconSize = 480; 
            const x = (canvas.width - iconSize) / 2;
            const y = (canvas.height - iconSize) / 2;

            if (currentLib === 'lucide') {
                const svgNode = document.querySelector('#iconContainer svg');
                if (svgNode) {
                    await drawSvgToCanvas(ctx, svgNode, x, y, iconSize);
                    downloadCanvas(canvas);
                }
            } else {
                ctx.fillStyle = customColor;
                ctx.globalAlpha = 0.8;
                ctx.font = `${iconSize}px "Phosphor-Fill"`; 
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                const tempDiv = document.createElement('div');
                tempDiv.style.fontFamily = 'Phosphor-Fill';
                tempDiv.className = `ph-fill ph-${currentIcon}`;
                document.body.appendChild(tempDiv);
                
                const char = window.getComputedStyle(tempDiv, ':before').content.replace(/['"]/g, '');
                document.body.removeChild(tempDiv);

                ctx.fillText(char, canvas.width/2, canvas.height/2 + 20); 
                ctx.globalAlpha = 1.0;
                downloadCanvas(canvas);
            }
        };

        async function drawSvgToCanvas(ctx, svgNode, x, y, size) {
            return new Promise((resolve) => {
                const svgData = new XMLSerializer().serializeToString(svgNode);
                const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(svgBlob);
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, x, y, size, size);
                    URL.revokeObjectURL(url);
                    resolve();
                };
                img.src = url;
            });
        }

        function downloadCanvas(canvas) {
            const pngUrl = canvas.toDataURL("image/png");
            const downloadLink = document.createElement("a");
            downloadLink.href = pngUrl;
            downloadLink.download = `cover-${currentLib}-${currentIcon}.png`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
